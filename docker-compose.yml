services:
  backend:
    build:
      context: ./backend
    container_name: ai-resume-backend
    environment:
      APP_ADDR: ":8081"
    ports:
      - "18081:8081"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ai-resume-frontend
    depends_on:
      - backend
    ports:
      - "5174:5174"
    restart: unless-stopped
